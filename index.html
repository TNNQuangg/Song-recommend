<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <h2>Đăng Nhập</h2>
            <input type="text" id="usernameInput" placeholder="Tên đăng nhập">
            <input type="password" id="passwordInput" placeholder="Mật khẩu">
            <button onclick="handleLogin()" class="login-btn">Đăng Nhập</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div class="container" id="main-app" style="display: none;">
        
        <main class="main-content">
            <div class="search-bar" style="display: flex; gap: 10px;">
                <div style="position: relative; flex: 1;">
                    <input type="text" id="searchInput" placeholder="Yêu thích/Mới nghe...">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <button onclick="handleLogout()" class="logout-btn">Đăng Xuất</button>
            </div>
            
            <div class="section-header">
                <h2>Lịch sử nghe nhạc</h2>
                <button onclick="clearAllHistory()" class="clear-all-btn">XÓA TẤT CẢ</button>
            </div>
            <div id="history-list" class="track-list">
                <p class="loading">Đang tải lịch sử...</p>
            </div>
        </main>

        <aside class="sidebar">
            <div class="recommendation-box" style="border: 1px solid #4facfe; box-shadow: 0 0 15px rgba(79, 172, 254, 0.2);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="color: #4facfe; margin: 0;">Gợi ý Kết hợp (Hybrid)</h3>
                </div>
                
                <div style="margin-bottom: 15px; font-size: 12px; color: #bbb; text-align: center; background: #242424; padding: 6px; border-radius: 6px;">
                    Auto: <span id="hybrid-status" style="color: #fff; font-weight: bold;">Đang tải...</span>
                </div>

                <div id="hybrid-recs" class="track-list">
                    <p class="loading">Hãy nghe 1 bài hát để phân tích...</p>
                </div>
            </div>
            <div class="recommendation-box">
                <h3>Top 5 gợi ý theo lịch sử</h3>
                <div id="history-recs" class="track-list">
                    <p class="loading">Đang phân tích dữ liệu ALS...</p>
                </div>
            </div>

            <div class="recommendation-box">
                <h3>Top 5 gợi ý theo giai điệu</h3>
                <div id="melody-recs" class="track-list">
                    <p class="loading">Đang phân tích âm thanh bằng KNN...</p>
                </div>
            </div>
        </aside>

    </div>

    <script src="app.js"></script>
</body>
</html>
